<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tutty Lab website coming soon." />
    <title>Tutty Lab</title>
    <style>
      :root {
        color-scheme: light;
        background: #f7f6ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        place-items: center;
        background:
          radial-gradient(circle at 82% 0%, rgb(54 42 255 / 0.22), transparent 32%),
          linear-gradient(135deg, #ffffff 0%, #f7f6ff 48%, #ecebff 100%);
      }

      main {
        display: grid;
        width: 100%;
        min-height: 100vh;
        place-items: center;
        padding: clamp(0.75rem, 2vw, 1.5rem);
      }

      img {
        display: block;
        width: min(100%, 640px);
        max-height: calc(100vh - clamp(1.5rem, 4vw, 3rem));
        object-fit: contain;
      }

      @media (max-width: 680px) {
        main {
          padding: 0;
        }

        img {
          width: 100%;
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/coming-soon.png" alt="Tutty Lab website will be online soon." />
    </main>
  </body>
</html>
