<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tutty Lab website coming soon." />
    <title>Tutty Lab</title>
    <style>
      :root {
        color-scheme: light;
        background: #f7f6ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        overflow: hidden;
        place-items: center;
        background:
          radial-gradient(circle at 82% 0%, rgb(54 42 255 / 0.22), transparent 32%),
          linear-gradient(135deg, #ffffff 0%, #f7f6ff 48%, #ecebff 100%);
      }

      main {
        display: grid;
        width: 100%;
        min-height: 100vh;
        overflow: hidden;
        place-items: center;
        padding: 0;
      }

      img {
        display: block;
        width: auto;
        height: 100vh;
        height: 100dvh;
        max-width: none;
        object-fit: contain;
      }

      @media (max-width: 700px) and (orientation: portrait) {
        body {
          min-height: 100svh;
          overflow: hidden;
          place-items: center;
        }

        main {
          min-height: 100svh;
          overflow: hidden;
          place-items: center;
        }

        img {
          width: 100vw;
          height: 100vh;
          height: 100dvh;
          object-fit: cover;
          object-position: 18% center;
        }
      }

      @media (max-width: 900px) and (orientation: landscape) {
        img {
          height: 100svh;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/coming-soon.png" alt="Tutty Lab website will be online soon." />
    </main>
  </body>
</html>
